<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SandyVault</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-page">
    <!-- Admin Header -->
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo">
                <img src="assets/logo.svg" alt="SandyVault Logo" class="logo-img">
                <div>
                    <h1 class="admin-title">SandyVault Admin</h1>
                    <p class="admin-subtitle">Digital Marketplace Management Panel</p>
                </div>
            </div>
            <div class="admin-user-info">
                <span class="welcome-text">Welcome, <span id="adminUsername">Sandy</span>!</span>
                <button class="btn btn-secondary" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Admin Content -->
    <main class="admin-content">
        <!-- Dashboard Overview -->
        <section class="admin-dashboard-overview">
            <div class="admin-grid">
                <!-- Products Management -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <h2 class="admin-card-title">Products</h2>
                    </div>
                    
                    <div class="admin-stats">
                        <div class="admin-stat">
                            <span class="admin-stat-number" id="totalProducts">24</span>
                            <span class="admin-stat-label">Total Products</span>
                        </div>
                        <div class="admin-stat">
                            <span class="admin-stat-number">6</span>
                            <span class="admin-stat-label">Categories</span>
                        </div>
                    </div>
                    
                    <div class="admin-actions">
                        <button class="btn btn-primary admin-btn" onclick="adminApp.viewProducts()">
                            <i class="fas fa-eye"></i>
                            View All
                        </button>
                        <button class="btn btn-secondary admin-btn" onclick="adminApp.addProduct()">
                            <i class="fas fa-plus"></i>
                            Add New
                        </button>
                    </div>
                </div>

                <!-- User Management -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <h2 class="admin-card-title">Users</h2>
                    </div>
                    
                    <div class="admin-stats">
                        <div class="admin-stat">
                            <span class="admin-stat-number">1,247</span>
                            <span class="admin-stat-label">Total Users</span>
                        </div>
                        <div class="admin-stat">
                            <span class="admin-stat-number">89</span>
                            <span class="admin-stat-label">Active Today</span>
                        </div>
                    </div>
                    
                    <div class="admin-actions">
                        <button class="btn btn-primary admin-btn" onclick="adminApp.viewUsers()">
                            <i class="fas fa-list"></i>
                            View Users
                        </button>
                        <button class="btn btn-secondary admin-btn" onclick="adminApp.userAnalytics()">
                            <i class="fas fa-chart-bar"></i>
                            Analytics
                        </button>
                    </div>
                </div>

                <!-- Sales Overview -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <h2 class="admin-card-title">Sales</h2>
                    </div>
                    
                    <div class="admin-stats">
                        <div class="admin-stat">
                            <span class="admin-stat-number">$12.5K</span>
                            <span class="admin-stat-label">This Month</span>
                        </div>
                        <div class="admin-stat">
                            <span class="admin-stat-number">342</span>
                            <span class="admin-stat-label">Orders</span>
                        </div>
                    </div>
                    
                    <div class="admin-actions">
                        <button class="btn btn-primary admin-btn" onclick="adminApp.viewSales()">
                            <i class="fas fa-receipt"></i>
                            View Sales
                        </button>
                        <button class="btn btn-secondary admin-btn" onclick="adminApp.exportData()">
                            <i class="fas fa-download"></i>
                            Export
                        </button>
                    </div>
                </div>

                <!-- System Settings -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-icon">
                            <i class="fas fa-cog"></i>
                        </div>
                        <h2 class="admin-card-title">Settings</h2>
                    </div>
                    
                    <div class="admin-stats">
                        <div class="admin-stat">
                            <span class="admin-stat-number">99.9%</span>
                            <span class="admin-stat-label">Uptime</span>
                        </div>
                        <div class="admin-stat">
                            <span class="admin-stat-number">2.1s</span>
                            <span class="admin-stat-label">Avg Load</span>
                        </div>
                    </div>
                    
                    <div class="admin-actions">
                        <button class="btn btn-primary admin-btn" onclick="adminApp.systemSettings()">
                            <i class="fas fa-tools"></i>
                            Configure
                        </button>
                        <button class="btn btn-secondary admin-btn" onclick="adminApp.systemHealth()">
                            <i class="fas fa-heartbeat"></i>
                            Health
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="admin-quick-actions">
            <h2 class="section-title">
                <i class="fas fa-bolt"></i>
                Quick Actions
            </h2>
            
            <div class="quick-actions-grid">
                <button class="btn btn-primary" onclick="adminApp.goToDashboard()">
                    <i class="fas fa-home"></i>
                    View Customer Dashboard
                </button>
                <button class="btn btn-secondary" onclick="adminApp.backupData()">
                    <i class="fas fa-database"></i>
                    Backup Data
                </button>
                <button class="btn btn-secondary" onclick="adminApp.maintainanceMode()">
                    <i class="fas fa-wrench"></i>
                    Maintenance Mode
                </button>
                <button class="btn btn-secondary" onclick="adminApp.sendNotification()">
                    <i class="fas fa-bell"></i>
                    Send Notification
                </button>
            </div>
        </section>

        <!-- Recent Activity -->
        <section class="admin-activity">
            <h2 class="section-title">
                <i class="fas fa-clock"></i>
                Recent Activity
            </h2>
            
            <div class="activity-feed" id="activityFeed">
                <!-- Activity items will be populated by JavaScript -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
